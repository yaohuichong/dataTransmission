<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件传输助手</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
</head>
<body>
    <div class="chat-container" id="chatContainer">
        <header class="chat-header">
            <div class="header-info">
                <div class="avatar">
                    <svg viewBox="0 0 48 48" width="40" height="40" aria-hidden="true">
                        <circle cx="24" cy="24" r="22" fill="#07C160"/>
                        <path d="M16 18h16v2H16zm0 5h16v2H16zm0 5h10v2H16z" fill="white"/>
                    </svg>
                </div>
                <div class="header-text">
                    <h2>文件传输助手</h2>
                    <span class="status">在线</span>
                </div>
            </div>
            <div class="header-actions">
                <button id="batchBtn" class="btn-icon" title="批量操作" aria-label="批量操作">
                    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                        <path fill="currentColor" d="M3 5h2v14H3V5zm4 0h2v14H7V5zm4 0h2v14h-2V5zm4 0h2v14h-2V5zm4 0h2v14h-2V5z"/>
                    </svg>
                </button>
                <button id="searchBtn" class="btn-icon" title="搜索" aria-label="搜索">
                    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                        <path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 001.48-5.34c-.47-2.78-2.79-5-5.59-5.34a6.505 6.505 0 00-7.27 7.27c.34 2.8 2.56 5.12 5.34 5.59a6.5 6.5 0 005.34-1.48l.27.28v.79l4.25 4.25c.41.41 1.08.41 1.49 0 .41-.41.41-1.08 0-1.49L15.5 14zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </button>
                <span class="username">{{ username }}</span>
                <button id="logoutBtn" class="btn-logout" aria-label="退出登录">
                    <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                        <path fill="currentColor" d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                    </svg>
                    退出
                </button>
            </div>
        </header>
        
        <div class="search-panel" id="searchPanel" role="search">
            <div class="search-input-wrap">
                <input type="text" id="searchKeyword" placeholder="搜索关键字..." aria-label="搜索关键字">
            </div>
            <div class="search-date-wrap">
                <div class="date-field">
                    <label for="searchStartDate">开始日期</label>
                    <input type="date" id="searchStartDate" title="开始日期" aria-label="开始日期">
                </div>
                <span class="date-separator">至</span>
                <div class="date-field">
                    <label for="searchEndDate">结束日期</label>
                    <input type="date" id="searchEndDate" title="结束日期" aria-label="结束日期">
                </div>
            </div>
            <div class="search-actions">
                <button id="searchSubmit" class="btn-search">搜索</button>
                <button id="searchClear" class="btn-clear">清除</button>
            </div>
            <div class="search-batch-panel" id="searchBatchPanel">
                <label class="search-select-all-wrap">
                    <input type="checkbox" id="searchSelectAll" aria-label="全选搜索结果">
                    <span>全选</span>
                </label>
                <span class="search-selected-count" id="searchSelectedCount" aria-live="polite">已选择 0 项</span>
                <div class="search-batch-actions">
                    <button id="searchBatchDownloadBtn" class="btn-search-batch" disabled aria-label="批量下载">
                        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                            <path fill="currentColor" d="M5 4h14v2H5V4zm7 18l6.67-7h-4.17V9h-5v6H5.33L12 22z"/>
                        </svg>
                        下载
                    </button>
                    <button id="searchBatchDeleteBtn" class="btn-search-batch btn-search-batch-danger" disabled aria-label="批量删除">
                        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                            <path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                        </svg>
                        删除
                    </button>
                </div>
            </div>
            <div class="search-results" id="searchResults" role="list" aria-label="搜索结果"></div>
        </div>
        
        <div class="batch-panel" id="batchPanel">
            <div class="batch-header">
                <label class="select-all-wrap">
                    <input type="checkbox" id="selectAll" aria-label="全选">
                    <span>全选</span>
                </label>
                <span class="selected-count" id="selectedCount" aria-live="polite">已选择 0 项</span>
                <div class="batch-actions">
                    <button id="batchDownloadBtn" class="btn-batch" disabled aria-label="批量下载">
                        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                            <path fill="currentColor" d="M5 4h14v2H5V4zm7 18l6.67-7h-4.17V9h-5v6H5.33L12 22z"/>
                        </svg>
                        批量下载
                    </button>
                    <button id="batchDeleteBtn" class="btn-batch btn-batch-danger" disabled aria-label="批量删除">
                        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                            <path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                        </svg>
                        批量删除
                    </button>
                    <button id="cancelBatchBtn" class="btn-batch">取消</button>
                </div>
            </div>
        </div>
        
        <main class="chat-messages" id="chatMessages" role="log" aria-label="消息列表" aria-live="polite">
            <div class="welcome-message">
                <div class="welcome-icon">📁</div>
                <h3>文件传输助手</h3>
                <p>在这里发送文字或文件，在其他设备上登录同一账号即可查看和下载</p>
            </div>
        </main>
        
        <footer class="chat-input-area">
            <div class="input-tools">
                <label class="tool-btn" id="fileBtn" title="发送文件" tabindex="0" role="button" aria-label="发送文件">
                    <input type="file" id="fileInput" style="display: none;" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                        <path fill="currentColor" d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm4 18H6V4h7v5h5v11z"/>
                    </svg>
                </label>
                <label class="tool-btn" id="folderBtn" title="发送文件夹" tabindex="0" role="button" aria-label="发送文件夹">
                    <input type="file" id="folderInput" webkitdirectory directory multiple mozdirectory style="display: none;" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                        <path fill="currentColor" d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
                    </svg>
                </label>
            </div>
            <div class="input-wrapper">
                <textarea id="messageInput" placeholder="输入消息..." rows="1" aria-label="消息输入框"></textarea>
            </div>
            <button id="sendBtn" class="btn-send" aria-label="发送消息">
                <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                    <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
                发送
            </button>
        </footer>
    </div>
    
    <div class="context-menu" id="contextMenu" role="menu">
        <div class="menu-item" data-action="copy" role="menuitem" tabindex="0">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                <path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
            </svg>
            复制
        </div>
        <div class="menu-item" data-action="delete" role="menuitem" tabindex="0">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                <path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
            </svg>
            删除
        </div>
    </div>
    
    <div class="notification" id="notification" role="alert" aria-live="assertive"></div>
    
    <div class="progress-modal" id="progressModal" role="dialog" aria-modal="true" aria-labelledby="progressTitle">
        <div class="progress-content">
            <div class="progress-title" id="progressTitle">上传中...</div>
            <div class="progress-bar-wrap">
                <div class="progress-bar" id="progressBar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
            <div class="progress-detail" id="progressDetail"></div>
        </div>
    </div>
    
    <div class="confirm-modal" id="confirmModal" role="alertdialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMessage">
        <div class="confirm-content">
            <div class="confirm-title" id="confirmTitle">确认</div>
            <div class="confirm-message" id="confirmMessage"></div>
            <div class="confirm-actions">
                <button id="confirmCancelBtn" class="btn-confirm btn-confirm-cancel">取消</button>
                <button id="confirmOkBtn" class="btn-confirm btn-confirm-ok">确定</button>
            </div>
        </div>
    </div>
    
    <div class="file-preview-modal" id="filePreviewModal" role="dialog" aria-modal="true" aria-labelledby="filePreviewTitle">
        <div class="file-preview-content" id="filePreviewContent">
            <div class="file-preview-header" id="filePreviewHeader">
                <div class="file-preview-title" id="filePreviewTitle">文件预览</div>
                <div class="file-preview-header-actions">
                    <button class="file-preview-fit-btn" id="filePreviewFitBtn" title="切换显示模式" aria-label="切换显示模式">
                        <svg viewBox="0 0 24 24" width="18" height="18">
                            <path fill="currentColor" d="M3 5v14h18V5H3zm16 12H5V7h14v10z"/>
                        </svg>
                    </button>
                    <button class="file-preview-close" id="filePreviewClose" aria-label="关闭预览">
                        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                            <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="file-preview-body" id="filePreviewBody"></div>
            <div class="file-preview-resize-handle" id="filePreviewResizeHandle"></div>
        </div>
    </div>
    
    <script>
        const chatContainer = document.getElementById('chatContainer');
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileInput = document.getElementById('fileInput');
        const folderInput = document.getElementById('folderInput');
        const notification = document.getElementById('notification');
        const contextMenu = document.getElementById('contextMenu');
        const searchPanel = document.getElementById('searchPanel');
        const searchBtn = document.getElementById('searchBtn');
        const searchKeyword = document.getElementById('searchKeyword');
        const searchStartDate = document.getElementById('searchStartDate');
        const searchEndDate = document.getElementById('searchEndDate');
        const searchSubmit = document.getElementById('searchSubmit');
        const searchClear = document.getElementById('searchClear');
        const searchResults = document.getElementById('searchResults');
        const searchBatchPanel = document.getElementById('searchBatchPanel');
        const searchSelectAll = document.getElementById('searchSelectAll');
        const searchSelectedCount = document.getElementById('searchSelectedCount');
        const searchBatchDownloadBtn = document.getElementById('searchBatchDownloadBtn');
        const searchBatchDeleteBtn = document.getElementById('searchBatchDeleteBtn');
        const batchBtn = document.getElementById('batchBtn');
        const batchPanel = document.getElementById('batchPanel');
        const selectAll = document.getElementById('selectAll');
        const selectedCount = document.getElementById('selectedCount');
        const batchDownloadBtn = document.getElementById('batchDownloadBtn');
        const batchDeleteBtn = document.getElementById('batchDeleteBtn');
        const cancelBatchBtn = document.getElementById('cancelBatchBtn');
        const progressModal = document.getElementById('progressModal');
        const progressBar = document.getElementById('progressBar');
        const progressTitle = document.getElementById('progressTitle');
        const progressText = document.getElementById('progressText');
        const progressDetail = document.getElementById('progressDetail');
        const confirmModal = document.getElementById('confirmModal');
        const confirmTitle = document.getElementById('confirmTitle');
        const confirmMessage = document.getElementById('confirmMessage');
        const confirmCancelBtn = document.getElementById('confirmCancelBtn');
        const confirmOkBtn = document.getElementById('confirmOkBtn');
        const filePreviewModal = document.getElementById('filePreviewModal');
        const filePreviewTitle = document.getElementById('filePreviewTitle');
        const filePreviewBody = document.getElementById('filePreviewBody');
        const filePreviewClose = document.getElementById('filePreviewClose');
        const filePreviewContent = document.getElementById('filePreviewContent');
        const filePreviewHeader = document.getElementById('filePreviewHeader');
        const filePreviewResizeHandle = document.getElementById('filePreviewResizeHandle');
        const filePreviewFitBtn = document.getElementById('filePreviewFitBtn');
        
        let lastMsgId = 0;
        let currentMsgId = null;
        let isSearchMode = false;
        let isBatchMode = false;
        let selectedMsgs = new Set();
        let selectedSearchMsgs = new Set();
        let searchResultMessages = [];
        let dragCounter = 0;
        
        function showNotification(message, type = 'info') {
            notification.textContent = message;
            notification.className = 'notification ' + type;
            notification.style.display = 'block';
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
        
        function showProgress(title) {
            progressTitle.textContent = title;
            progressBar.style.width = '0%';
            progressText.textContent = '0%';
            progressBar.setAttribute('aria-valuenow', '0');
            progressDetail.textContent = '';
            progressModal.style.display = 'flex';
        }
        
        function updateProgress(percent, detail) {
            progressBar.style.width = percent + '%';
            progressBar.setAttribute('aria-valuenow', Math.round(percent));
            progressText.textContent = Math.round(percent) + '%';
            if (detail) progressDetail.textContent = detail;
        }
        
        function hideProgress() {
            progressModal.style.display = 'none';
        }
        
        let confirmResolve = null;
        
        function showConfirm(title, message, isDanger = false) {
            confirmTitle.textContent = title;
            confirmMessage.textContent = message;
            confirmOkBtn.classList.toggle('danger', isDanger);
            confirmModal.style.display = 'flex';
            confirmOkBtn.focus();
            return new Promise((resolve) => {
                confirmResolve = resolve;
            });
        }
        
        function hideConfirm(result) {
            confirmModal.style.display = 'none';
            if (confirmResolve) {
                confirmResolve(result);
                confirmResolve = null;
            }
        }
        
        function showFilePreview(filename, fileUrl, fileType) {
            filePreviewTitle.textContent = filename;
            filePreviewBody.innerHTML = '';
            
            filePreviewContent.style.position = '';
            filePreviewContent.style.left = '';
            filePreviewContent.style.top = '';
            filePreviewContent.style.width = '';
            filePreviewContent.style.height = '';
            filePreviewModal.style.alignItems = '';
            filePreviewModal.style.justifyContent = '';
            
            if (fileType.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = fileUrl + '?preview=true';
                img.alt = filename;
                img.onerror = () => {
                    filePreviewBody.innerHTML = '<p style="color: var(--text-muted);">图片加载失败</p>';
                };
                filePreviewBody.appendChild(img);
            } else if (fileType === 'application/pdf') {
                const iframe = document.createElement('iframe');
                iframe.src = fileUrl + '?preview=true#toolbar=1&navpanes=0&view=FitH';
                filePreviewBody.appendChild(iframe);
            } else {
                filePreviewBody.innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <div style="font-size: 64px; margin-bottom: 16px;">📄</div>
                        <p style="color: var(--text-secondary); margin-bottom: 16px;">此文件类型不支持预览</p>
                        <a href="${fileUrl}" download="${filename}" class="btn btn-primary" style="text-decoration: none;">下载文件</a>
                    </div>
                `;
            }
            
            filePreviewModal.style.display = 'flex';
        }
        
        function hideFilePreview() {
            filePreviewModal.style.display = 'none';
            filePreviewBody.innerHTML = '';
            filePreviewContent.style.position = '';
            filePreviewContent.style.left = '';
            filePreviewContent.style.top = '';
            filePreviewContent.style.width = '';
            filePreviewContent.style.height = '';
            filePreviewModal.style.alignItems = '';
            filePreviewModal.style.justifyContent = '';
        }
        
        function updateSelectedCount() {
            const count = selectedMsgs.size;
            selectedCount.textContent = `已选择 ${count} 项`;
            batchDownloadBtn.disabled = count === 0;
            batchDeleteBtn.disabled = count === 0;
            selectAll.checked = count > 0 && count === document.querySelectorAll('.msg-checkbox').length;
        }
        
        function toggleBatchMode(enable) {
            isBatchMode = enable;
            batchPanel.classList.toggle('active', enable);
            document.querySelectorAll('.message').forEach(msg => {
                const checkbox = msg.querySelector('.msg-checkbox');
                if (checkbox) {
                    checkbox.style.display = enable ? 'inline-block' : 'none';
                    if (!enable) checkbox.checked = false;
                }
            });
            if (!enable) {
                selectedMsgs.clear();
                selectAll.checked = false;
            }
            updateSelectedCount();
        }
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function formatTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const isToday = date.toDateString() === now.toDateString();
            
            if (isToday) {
                return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            } else {
                return date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' }) + ' ' + 
                       date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            }
        }
        
        function formatDateTime(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('zh-CN') + ' ' + 
                   date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                pdf: '📕', doc: '📘', docx: '📘',
                xls: '📗', xlsx: '📗',
                ppt: '📙', pptx: '📙',
                zip: '📦', rar: '📦', '7z': '📦', tar: '📦', gz: '📦',
                mp3: '🎵', wav: '🎵', flac: '🎵', m4a: '🎵',
                mp4: '🎬', avi: '🎬', mkv: '🎬', mov: '🎬',
                jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', bmp: '🖼️', webp: '🖼️',
                txt: '📄', md: '📄',
                py: '🐍', js: '📜', ts: '📜', html: '🌐', css: '🎨', json: '📋',
                exe: '⚙️', msi: '⚙️', apk: '📱', ipa: '📱'
            };
            return icons[ext] || '📎';
        }
        
        function isPreviewable(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const previewable = ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp', 'pdf'];
            return previewable.includes(ext);
        }
        
        function getFileType(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp'];
            if (imageExts.includes(ext)) return 'image/' + ext;
            if (ext === 'pdf') return 'application/pdf';
            return 'application/octet-stream';
        }
        
        function createMessageElement(msg) {
            const div = document.createElement('div');
            div.className = 'message';
            div.dataset.id = msg.id;
            div.dataset.type = msg.type;
            if (msg.type === 'file') div.dataset.fileId = msg.file_id;
            if (msg.type === 'folder') div.dataset.folderId = msg.folder_id;
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'msg-checkbox';
            checkbox.style.display = isBatchMode ? 'inline-block' : 'none';
            checkbox.setAttribute('aria-label', '选择此消息');
            checkbox.addEventListener('change', (e) => {
                if (e.target.checked) {
                    selectedMsgs.add(msg.id);
                } else {
                    selectedMsgs.delete(msg.id);
                }
                updateSelectedCount();
            });
            
            const timeDiv = document.createElement('div');
            timeDiv.className = 'msg-time';
            timeDiv.textContent = formatTime(msg.time);
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'msg-content';
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'msg-bubble';
            
            if (msg.type === 'text') {
                bubbleDiv.innerHTML = `<div class="msg-text">${escapeHtml(msg.content)}</div>`;
            } else if (msg.type === 'folder') {
                bubbleDiv.classList.add('has-file');
                bubbleDiv.innerHTML = `
                    <div class="msg-file msg-folder" data-folder-id="${msg.folder_id}">
                        <span class="file-icon">📁</span>
                        <div class="file-info">
                            <span class="file-name" title="${escapeHtml(msg.filename)}">${escapeHtml(msg.filename)}</span>
                            <span class="file-size">${msg.file_count} 个文件 · ${formatFileSize(msg.file_size)}</span>
                        </div>
                        <a href="/api/messages/folder/${msg.folder_id}" class="file-download" download="${escapeHtml(msg.filename)}.zip" onclick="downloadWithProgress(event, '${msg.folder_id}', 'folder', '${escapeHtml(msg.filename)}')" aria-label="下载文件夹">
                            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                                <path fill="currentColor" d="M5 4h14v2H5V4zm7 18l6.67-7h-4.17V9h-5v6H5.33L12 22z"/>
                            </svg>
                        </a>
                    </div>
                `;
            } else {
                bubbleDiv.classList.add('has-file');
                var displayName = msg.relative_path ? msg.relative_path : msg.filename;
                const canPreview = isPreviewable(msg.filename);
                bubbleDiv.innerHTML = `
                    <div class="msg-file" data-id="${msg.file_id}" data-filename="${escapeHtml(msg.filename)}">
                        <span class="file-icon">${getFileIcon(msg.filename)}</span>
                        <div class="file-info">

        function addMessage(msg, prepend = false) {
            const existingMsg = chatMessages.querySelector(`[data-id="${msg.id}"]`);
            if (existingMsg) return;
            
            const msgEl = createMessageElement(msg);
            
            if (prepend) {
                const welcomeMsg = chatMessages.querySelector('.welcome-message');
                if (welcomeMsg) {
                    chatMessages.insertBefore(msgEl, welcomeMsg.nextSibling);
                } else {
                    chatMessages.insertBefore(msgEl, chatMessages.firstChild.nextSibling);
                }
            } else {
                chatMessages.appendChild(msgEl);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            
            lastMsgId = Math.max(lastMsgId, msg.id);
        }
        
        async function loadMessages() {
            try {
                const response = await fetch(`/api/messages?since=0`);
                const data = await response.json();
                
                if (response.ok) {
                    chatMessages.innerHTML = `
                        <div class="welcome-message">
                            <div class="welcome-icon">📁</div>
                            <h3>文件传输助手</h3>
                            <p>在这里发送文字或文件，在其他设备上登录同一账号即可查看和下载</p>
                        </div>
                    `;
                    data.messages.forEach(msg => addMessage(msg));
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                } else if (response.status === 401) {
                    window.location.href = '/login';
                }
            } catch (error) {
                console.error('Failed to load messages:', error);
            }
        }
        
        async function pollNewMessages() {
            if (isSearchMode) return;
            
            try {
                const response = await fetch(`/api/messages?since=${lastMsgId}`);
                const data = await response.json();
                
                if (response.ok && data.messages.length > 0) {
                    data.messages.forEach(msg => addMessage(msg));
                }
            } catch (error) {
                console.error('Poll error:', error);
            }
        }
        
        async function sendTextMessage() {
            const content = messageInput.value.trim();
            if (!content) return;
            
            messageInput.value = '';
            messageInput.style.height = 'auto';
            
            try {
                const response = await fetch('/api/messages/text', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    addMessage(data.msg);
                } else {
                    showNotification(data.error || '发送失败', 'error');
                }
            } catch (error) {
                showNotification('网络错误', 'error');
            }
        }
        
        async function sendFile(file, relativePath = null) {
            const formData = new FormData();
            formData.append('file', file);
            if (relativePath) {
                formData.append('relative_path', relativePath);
            }
            
            showProgress('上传文件中...');
            
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = (e.loaded / e.total) * 100;
                        updateProgress(percent, `${formatFileSize(e.loaded)} / ${formatFileSize(e.total)}`);
                    }
                };
                xhr.onload = () => {
                    hideProgress();
                    if (xhr.status === 201) {
                        const data = JSON.parse(xhr.responseText);
                        addMessage(data.msg);
                        showNotification('发送成功', 'success');
                        resolve(data);
                    } else {
                        const data = JSON.parse(xhr.responseText);
                        showNotification(data.error || '发送失败', 'error');
                        reject(data);
                    }
                };
                xhr.onerror = () => {
                    hideProgress();
                    showNotification('网络错误', 'error');
                    reject(new Error('网络错误'));
                };
                xhr.open('POST', '/api/messages/file');
                xhr.send(formData);
            });
        }

        function downloadWithProgress(event, id, type, filename) {
            if (event) event.preventDefault();
            
            const url = type === 'folder' ? `/api/messages/folder/${id}` : `/api/messages/file/${id}`;
            const finalFilename = type === 'folder' ? `${filename}.zip` : filename;
            
            showProgress(`正在下载 ${filename}...`);
            updateProgress(50, '请选择保存位置...');
            
            const a = document.createElement('a');
            a.href = url;
            a.download = finalFilename;
            a.style.display = 'none';
            document.body.appendChild(a);
            
            setTimeout(() => {
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    hideProgress();
                    showNotification(`已开始下载 ${filename}`, 'success');
                }, 500);
            }, 200);
        }
        
        async function batchDownload() {
            const items = [];
            selectedMsgs.forEach(id => {
                const msgEl = chatMessages.querySelector(`[data-id="${id}"]`);
                if (msgEl && msgEl.dataset.type !== 'text') {
                    items.push({
                        id: id,
                        type: msgEl.dataset.type,
                        fileId: msgEl.dataset.fileId,
                        folderId: msgEl.dataset.folderId,
                        filename: msgEl.querySelector('.file-name').textContent
                    });
                }
            });
            
            if (items.length === 0) {
                showNotification('请选择要下载的文件', 'error');
                return;
            }
            
            const confirmed = await showConfirm('批量下载', `确定下载选中的 ${items.length} 个文件吗？`);
            if (!confirmed) return;
            
            showProgress('批量下载中...');
            
            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                updateProgress((i / items.length) * 100, `正在下载 ${item.filename} (${i + 1}/${items.length})`);
                
                const url = item.type === 'folder' 
                    ? `/api/messages/folder/${item.folderId}` 
                    : `/api/messages/file/${item.fileId}`;
                const finalFilename = item.type === 'folder' ? `${item.filename}.zip` : item.filename;
                
                try {
                    const response = await fetch(url);
                    if (response.ok) {
                        const blob = await response.blob();
                        const downloadUrl = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = downloadUrl;
                        a.download = finalFilename;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(downloadUrl);
                        await new Promise(r => setTimeout(r, 500));
                    }
                } catch (e) {
                    console.error('Download error:', e);
                }
            }
            
            hideProgress();
            showNotification(`成功下载 ${items.length} 个文件`, 'success');
            toggleBatchMode(false);
        }
        
        async function batchDelete() {
            if (selectedMsgs.size === 0) return;
            
            const confirmed = await showConfirm('批量删除', `确定删除选中的 ${selectedMsgs.size} 条消息吗？此操作不可撤销。`, true);

                return;

                if (startDate) params.append('start_date', startDate);
                if (endDate) params.append('end_date', endDate);

        function bindSearchItemEvents() {
            searchResults.querySelectorAll('.search-item-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const id = e.target.dataset.id;
                    if (e.target.checked) {
                        selectedSearchMsgs.add(id);
                    } else {
                        selectedSearchMsgs.delete(id);
                    }
                    updateSearchSelectedCount();
                });
            });
            
            searchResults.querySelectorAll('.search-download-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const type = btn.dataset.type;
                    const filename = btn.dataset.filename;
                    if (type === 'folder') {
                        downloadWithProgress(e, btn.dataset.folderId, 'folder', filename);
                    } else {
                        downloadWithProgress(e, btn.dataset.fileId, 'file', filename);
                    }
                });
            });
            
            searchResults.querySelectorAll('.search-delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    showConfirm('确认删除', '确定删除这条消息吗？此操作不可撤销。', true).then(confirmed => {
                        if (confirmed) {
                            deleteSearchItem(id);
                        }
                    });
                });
            });
        }

            searchEndDate.value = '';
            searchResults.innerHTML = '';
            searchBatchPanel.style.display = 'none';
            selectedSearchMsgs.clear();
            searchResultMessages = [];
            searchSelectAll.checked = false;
            updateSearchSelectedCount();
            searchPanel.classList.remove('active');
            isSearchMode = false;
        }
        
        function handleDragEnter(e) {
            e.preventDefault();
            dragCounter++;
            chatContainer.classList.add('drag-over');
        }
        
        function handleDragLeave(e) {
            e.preventDefault();
            dragCounter--;
            if (dragCounter === 0) {
                chatContainer.classList.remove('drag-over');
            }
        }
        
        function handleDragOver(e) {
            e.preventDefault();
        }
        
        function handleDrop(e) {
            e.preventDefault();
            dragCounter = 0;
            chatContainer.classList.remove('drag-over');
            
            const items = e.dataTransfer.items;
            const files = e.dataTransfer.files;
            
            if (files.length > 0) {
                for (let i = 0; i < files.length; i++) {
                    sendFile(files[i]);
                }
            }
        }
        
        sendBtn.addEventListener('click', sendTextMessage);
        
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendTextMessage();
            }
        });
        
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
        
        fileInput.addEventListener('change', (e) => {
            console.log('fileInput change triggered, files:', e.target.files.length);
            if (e.target.files.length > 0) {
                sendFile(e.target.files[0]);
                e.target.value = '';
            }
        });
        
        folderInput.addEventListener('change', (e) => {
            console.log('folderInput change triggered, files:', e.target.files.length);
            if (e.target.files.length > 0) {
                console.log('Files in folder:', Array.from(e.target.files).map(f => f.webkitRelativePath));
                sendFolder(Array.from(e.target.files));
                e.target.value = '';
            }
        });
        
        searchBtn.addEventListener('click', () => {
            searchPanel.classList.toggle('active');
            if (searchPanel.classList.contains('active')) {
                searchKeyword.focus();
            }
        });
        
        searchSubmit.addEventListener('click', searchMessages);
        
        searchClear.addEventListener('click', clearSearch);
        
        searchKeyword.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                searchMessages();
            }
        });
        
        searchSelectAll.addEventListener('change', (e) => {
            const checkboxes = searchResults.querySelectorAll('.search-item-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = e.target.checked;
                const id = cb.dataset.id;
                if (e.target.checked) {
                    selectedSearchMsgs.add(id);
                } else {
                    selectedSearchMsgs.delete(id);
                }
            });
            updateSearchSelectedCount();
        });
        
        searchBatchDownloadBtn.addEventListener('click', searchBatchDownload);
        searchBatchDeleteBtn.addEventListener('click', searchBatchDelete);
        
        batchBtn.addEventListener('click', () => {
            toggleBatchMode(!isBatchMode);
        });
        
        selectAll.addEventListener('change', (e) => {
            const checkboxes = document.querySelectorAll('.msg-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = e.target.checked;
                const msgId = cb.closest('.message').dataset.id;
                if (e.target.checked) {
                    selectedMsgs.add(msgId);
                } else {
                    selectedMsgs.delete(msgId);
                }
            });
            updateSelectedCount();
        });
        
        batchDownloadBtn.addEventListener('click', batchDownload);
        batchDeleteBtn.addEventListener('click', batchDelete);
        cancelBatchBtn.addEventListener('click', () => toggleBatchMode(false));
        
        confirmCancelBtn.addEventListener('click', () => hideConfirm(false));
        confirmOkBtn.addEventListener('click', () => hideConfirm(true));
        
        filePreviewFitBtn.addEventListener('click', () => {
            const img = filePreviewBody.querySelector('img');
            if (img) {
                img.classList.toggle('fit-fill');
                if (img.classList.contains('fit-fill')) {
                    showNotification('已切换为填充模式', 'info');
                    filePreviewFitBtn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 5v14h18V5H3zm16 12H5V7h14v10z"/></svg>`;
                } else {
                    showNotification('已切换为适应模式', 'info');
                }
            }
        });
        
        filePreviewClose.addEventListener('click', hideFilePreview);
        filePreviewModal.addEventListener('click', (e) => {
            if (e.target === filePreviewModal) {
                hideFilePreview();
            }
        });
        
        let isResizing = false;
        let isDragging = false;
        let resizeStartX, resizeStartY, resizeStartWidth, resizeStartHeight;
        let dragStartX, dragStartY, dragStartLeft, dragStartTop;
        
        filePreviewResizeHandle.addEventListener('mousedown', (e) => {
            e.preventDefault();
            e.stopPropagation();
            isResizing = true;
            resizeStartX = e.clientX;
            resizeStartY = e.clientY;
            resizeStartWidth = filePreviewContent.offsetWidth;
            resizeStartHeight = filePreviewContent.offsetHeight;
            filePreviewContent.classList.add('resizing');
        });
        
        filePreviewHeader.addEventListener('mousedown', (e) => {
            if (e.target === filePreviewClose || e.target.closest('.file-preview-close')) return;
            e.preventDefault();
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            const rect = filePreviewContent.getBoundingClientRect();
            dragStartLeft = rect.left;
            dragStartTop = rect.top;
            filePreviewContent.style.position = 'fixed';
            filePreviewContent.style.left = dragStartLeft + 'px';
            filePreviewContent.style.top = dragStartTop + 'px';
            filePreviewContent.style.margin = '0';
            filePreviewModal.style.alignItems = 'flex-start';
            filePreviewModal.style.justifyContent = 'flex-start';
            filePreviewContent.classList.add('resizing');
        });
        
        document.addEventListener('mousemove', (e) => {
            if (isResizing) {
                const deltaX = e.clientX - resizeStartX;
                const deltaY = e.clientY - resizeStartY;
                const newWidth = Math.max(600, Math.min(window.innerWidth - 20, resizeStartWidth + deltaX));
                const newHeight = Math.max(400, Math.min(window.innerHeight - 20, resizeStartHeight + deltaY));
                filePreviewContent.style.width = newWidth + 'px';
                filePreviewContent.style.height = newHeight + 'px';
            }
            if (isDragging) {
                const deltaX = e.clientX - dragStartX;
                const deltaY = e.clientY - dragStartY;
                const newLeft = Math.max(0, Math.min(window.innerWidth - filePreviewContent.offsetWidth, dragStartLeft + deltaX));
                const newTop = Math.max(0, Math.min(window.innerHeight - filePreviewContent.offsetHeight, dragStartTop + deltaY));
                filePreviewContent.style.left = newLeft + 'px';
                filePreviewContent.style.top = newTop + 'px';
            }
        });
        
        document.addEventListener('mouseup', () => {
            if (isResizing || isDragging) {
                isResizing = false;
                isDragging = false;
                filePreviewContent.classList.remove('resizing');
            }
        });
        
        chatMessages.addEventListener('click', (e) => {
            const previewBtn = e.target.closest('.file-preview-btn');
            if (previewBtn) {
                const fileId = previewBtn.dataset.fileId;
                const filename = previewBtn.dataset.filename;
                const fileUrl = `/api/messages/file/${fileId}`;
                const fileType = getFileType(filename);
                showFilePreview(filename, fileUrl, fileType);
            }
        });
        
        chatMessages.addEventListener('contextmenu', (e) => {
            const bubble = e.target.closest('.msg-bubble');
            if (bubble) {
                e.preventDefault();
                const message = bubble.closest('.message');
                currentMsgId = message.dataset.id;
                
                contextMenu.style.left = e.pageX + 'px';
                contextMenu.style.top = e.pageY + 'px';
                contextMenu.style.display = 'block';
            }
        });
        
        document.addEventListener('click', () => {
            contextMenu.style.display = 'none';
        });
        
        contextMenu.addEventListener('click', (e) => {
            const action = e.target.closest('.menu-item')?.dataset.action;
            if (currentMsgId && action) {
                if (action === 'copy') {
                    const msgEl = chatMessages.querySelector(`[data-id="${currentMsgId}"]`);
                    const textEl = msgEl.querySelector('.msg-text');
                    if (textEl) {
                        navigator.clipboard.writeText(textEl.textContent);
                        showNotification('已复制', 'success');
                    }
                } else if (action === 'delete') {
                    showConfirm('确认删除', '确定删除这条消息吗？', true).then(confirmed => {
                        if (confirmed) {
                            deleteMessage(currentMsgId);
                        }
                    });
                }
            }
        });
        
        chatContainer.addEventListener('dragenter', handleDragEnter);
        chatContainer.addEventListener('dragleave', handleDragLeave);
        chatContainer.addEventListener('dragover', handleDragOver);
        chatContainer.addEventListener('drop', handleDrop);
        
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (filePreviewModal.style.display === 'flex') {
                    hideFilePreview();
                }
                if (confirmModal.style.display === 'flex') {
                    hideConfirm(false);
                }
                if (progressModal.style.display === 'flex') {
                    return;
                }
            }
        });
        
        loadMessages();
        
        setInterval(pollNewMessages, 2000);
    </script>
</body>
</html>
