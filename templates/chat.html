<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件传输助手</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}?v=13">
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>📂 我的柜子</h3>
                <button id="addCategoryBtn" class="btn-add-category" title="新建目录" aria-label="新建目录">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                </button>
            </div>
            <div class="sidebar-search">
                <input type="text" id="categorySearchInput" placeholder="搜索目录..." aria-label="搜索目录" autocomplete="off">
                <svg class="sidebar-search-icon" viewBox="0 0 24 24" width="16" height="16">
                    <path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 001.48-5.34c-.47-2.78-2.79-5-5.59-5.34a6.505 6.505 0 00-7.27 7.27c.34 2.8 2.56 5.12 5.34 5.59a6.5 6.5 0 005.34-1.48l.27.28v.79l4.25 4.25c.41.41 1.08.41 1.49 0 .41-.41.41-1.08 0-1.49L15.5 14zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
            </div>
            <div class="category-list" id="categoryList">
                <div class="category-item active" data-category="" data-name="全部">
                    <span class="category-icon">🏠</span>
                    <span class="category-name">全部</span>
                    <span class="category-count" id="totalCount">0</span>
                </div>
            </div>
            <div class="sidebar-trash">
                <div class="trash-item" id="trashBtn" title="回收站">
                    <span class="trash-icon">🗑️</span>
                    <span class="trash-name">回收站</span>
                    <span class="trash-count" id="trashCount">0</span>
                </div>
            </div>
            <div class="sidebar-footer">
                <button id="toggleSidebarBtnDesktop" class="btn-toggle-sidebar-desktop" title="收起侧栏" aria-label="收起侧栏">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                    </svg>
                </button>
            </div>
        </aside>
        
        <div class="chat-container" id="chatContainer">
        <header class="chat-header">
            <div class="header-info">
                <button id="toggleSidebarBtn" class="avatar-btn" title="展开侧栏" aria-label="展开侧栏">
                    <div class="avatar">
                        <svg viewBox="0 0 48 48" width="40" height="40" aria-hidden="true">
                            <circle cx="24" cy="24" r="22" fill="#07C160"/>
                            <path d="M16 18h16v2H16zm0 5h16v2H16zm0 5h10v2H16z" fill="white"/>
                        </svg>
                    </div>
                </button>
                <div class="header-text">
                    <h2>文件传输助手</h2>
                    <span class="status">在线</span>
                </div>
            </div>
            <div class="header-actions">
                <button id="logoutBtn" class="btn-logout" aria-label="退出登录">
                    <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                        <path fill="currentColor" d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                    </svg>
                    退出
                </button>
                <div class="action-btns">
                    <button id="batchBtn" class="btn-icon" title="批量操作" aria-label="批量操作">
                        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                            <path fill="currentColor" d="M3 5h2v14H3V5zm4 0h2v14H7V5zm4 0h2v14h-2V5zm4 0h2v14h-2V5zm4 0h2v14h-2V5z"/>
                        </svg>
                    </button>
                    <button id="searchBtn" class="btn-icon" title="搜索" aria-label="搜索">
                        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                            <path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 001.48-5.34c-.47-2.78-2.79-5-5.59-5.34a6.505 6.505 0 00-7.27 7.27c.34 2.8 2.56 5.12 5.34 5.59a6.5 6.5 0 005.34-1.48l.27.28v.79l4.25 4.25c.41.41 1.08.41 1.49 0 .41-.41.41-1.08 0-1.49L15.5 14zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                    </button>
                </div>
                <span class="username">{{ username }}</span>
            </div>
        </header>
        
        <div class="search-panel" id="searchPanel" role="search">
            <div class="search-row">
                <div class="search-input-wrap search-keyword-wrap">
                    <input type="text" id="searchKeyword" placeholder="搜索关键字..." aria-label="搜索关键字">
                </div>
                <div class="search-input-wrap search-category-wrap search-category-dropdown-wrap">
                    <input type="text" id="searchCategoryName" placeholder="目录名关键词..." aria-label="目录名关键词" autocomplete="off">
                    <div class="search-category-dropdown" id="searchCategoryDropdown">
                        <div class="search-category-dropdown-list" id="searchCategoryDropdownList"></div>
                        <div class="search-category-dropdown-actions">
                            <button type="button" class="search-category-btn" id="searchCategorySelectAllBtn">全选</button>
                            <button type="button" class="search-category-btn" id="searchCategoryDeselectAllBtn">取消全选</button>
                            <button type="button" class="search-category-btn search-category-btn-primary" id="searchCategoryConfirmBtn">确定</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="search-row">
                <div class="search-filter-wrap">
                    <label class="search-filter-label">文件类型</label>
                    <select id="searchFileType" aria-label="文件类型">
                        <option value="">全部类型</option>
                        <option value="text">文字消息</option>
                        <option value="image">图片</option>
                        <option value="document">文档</option>
                        <option value="video">视频</option>
                        <option value="audio">音频</option>
                        <option value="archive">压缩包</option>
                        <option value="folder">文件夹</option>
                        <option value="other">其他文件</option>
                    </select>
                </div>
            </div>
            <div class="search-date-wrap">
                <div class="date-field">
                    <label for="searchStartDate">开始日期</label>
                    <input type="date" id="searchStartDate" title="开始日期" aria-label="开始日期">
                </div>
                <span class="date-separator">至</span>
                <div class="date-field">
                    <label for="searchEndDate">结束日期</label>
                    <input type="date" id="searchEndDate" title="结束日期" aria-label="结束日期">
                </div>
            </div>
            <div class="search-actions">
                <button id="searchSubmit" class="btn-search">搜索</button>
                <button id="searchClear" class="btn-clear">清除</button>
            </div>
            <div class="search-batch-panel" id="searchBatchPanel">
                <label class="search-select-all-wrap">
                    <input type="checkbox" id="searchSelectAll" aria-label="全选搜索结果">
                    <span>全选</span>
                </label>
                <span class="search-selected-count" id="searchSelectedCount" aria-live="polite">已选择 0 项</span>
                <div class="search-batch-actions">
                    <button id="searchBatchCopyBtn" class="btn-search-batch" disabled aria-label="批量复制">
                        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                            <path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                        </svg>
                        复制
                    </button>
                    <button id="searchBatchDownloadBtn" class="btn-search-batch" disabled aria-label="批量下载">
                        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                            <path fill="currentColor" d="M5 4h14v2H5V4zm7 18l6.67-7h-4.17V9h-5v6H5.33L12 22z"/>
                        </svg>
                        下载
                    </button>
                    <button id="searchBatchDeleteBtn" class="btn-search-batch btn-search-batch-danger" disabled aria-label="批量删除">
                        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                            <path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                        </svg>
                        删除
                    </button>
                </div>
            </div>
            <div class="search-results" id="searchResults" role="list" aria-label="搜索结果"></div>
        </div>
        
        <div class="batch-panel" id="batchPanel">
            <div class="batch-header">
                <label class="select-all-wrap">
                    <input type="checkbox" id="selectAll" aria-label="全选">
                    <span>全选</span>
                </label>
                <span class="selected-count" id="selectedCount" aria-live="polite">已选择 0 项</span>
                <div class="batch-actions">
                    <button id="batchCopyBtn" class="btn-batch" disabled aria-label="批量复制">
                        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                            <path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                        </svg>
                        批量复制
                    </button>
                    <button id="batchDownloadBtn" class="btn-batch" disabled aria-label="批量下载">
                        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                            <path fill="currentColor" d="M5 4h14v2H5V4zm7 18l6.67-7h-4.17V9h-5v6H5.33L12 22z"/>
                        </svg>
                        批量下载
                    </button>
                    <button id="batchDeleteBtn" class="btn-batch btn-batch-danger" disabled aria-label="批量删除">
                        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                            <path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                        </svg>
                        批量删除
                    </button>
                    <button id="cancelBatchBtn" class="btn-batch">取消</button>
                </div>
            </div>
        </div>
        
        <main class="chat-messages" id="chatMessages" role="log" aria-label="消息列表" aria-live="polite">
            <div class="welcome-message">
                <div class="welcome-icon">📁</div>
                <h3>文件传输助手</h3>
                <p>在这里发送文字或文件，在其他设备上登录同一账号即可查看和下载</p>
            </div>
        </main>
        
        <footer class="chat-input-area">
            <div class="input-tools">
                <label class="tool-btn" id="fileBtn" title="发送文件" tabindex="0" role="button" aria-label="发送文件">
                    <input type="file" id="fileInput" style="display: none;" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                        <path fill="currentColor" d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm4 18H6V4h7v5h5v11z"/>
                    </svg>
                </label>
                <label class="tool-btn" id="folderBtn" title="发送文件夹" tabindex="0" role="button" aria-label="发送文件夹">
                    <input type="file" id="folderInput" webkitdirectory directory multiple mozdirectory style="display: none;" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                        <path fill="currentColor" d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
                    </svg>
                </label>
            </div>
            <div class="input-wrapper">
                <textarea id="messageInput" placeholder="输入消息..." rows="1" aria-label="消息输入框"></textarea>
            </div>
            <button id="sendBtn" class="btn-send" aria-label="发送消息">
                <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                    <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
                发送
            </button>
        </footer>
        </div>
    </div>
    
    <div class="category-modal" id="categoryModal" role="dialog" aria-modal="true">
        <div class="category-modal-content">
            <div class="category-modal-header">
                <h3 id="categoryModalTitle">新建目录</h3>
                <button class="category-modal-close" id="categoryModalClose" aria-label="关闭">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <div class="category-modal-body">
                <input type="text" id="categoryNameInput" placeholder="目录名称" maxlength="50" aria-label="目录名称">
            </div>
            <div class="category-modal-footer">
                <button id="categoryCancelBtn" class="btn-category-cancel">取消</button>
                <button id="categoryConfirmBtn" class="btn-category-confirm">确定</button>
            </div>
        </div>
    </div>
    
    <div class="context-menu" id="contextMenu" role="menu">
        <div class="menu-item" data-action="copy" role="menuitem" tabindex="0">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                <path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
            </svg>
            复制
        </div>
        <div class="menu-item" data-action="delete" role="menuitem" tabindex="0">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                <path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
            </svg>
            删除
        </div>
    </div>
    
    <div class="notification" id="notification" role="alert" aria-live="assertive"></div>
    
    <div class="progress-modal" id="progressModal" role="dialog" aria-modal="true" aria-labelledby="progressTitle">
        <div class="progress-content">
            <div class="progress-title" id="progressTitle">上传中...</div>
            <div class="progress-bar-wrap">
                <div class="progress-bar" id="progressBar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
            <div class="progress-detail" id="progressDetail"></div>
        </div>
    </div>
    
    <div class="confirm-modal" id="confirmModal" role="alertdialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMessage">
        <div class="confirm-content">
            <div class="confirm-title" id="confirmTitle">确认</div>
            <div class="confirm-message" id="confirmMessage"></div>
            <div class="confirm-actions">
                <button id="confirmCancelBtn" class="btn-confirm btn-confirm-cancel">取消</button>
                <button id="confirmOkBtn" class="btn-confirm btn-confirm-ok">确定</button>
            </div>
        </div>
    </div>
    
    <div class="file-preview-modal" id="filePreviewModal" role="dialog" aria-modal="true" aria-labelledby="filePreviewTitle">
        <div class="file-preview-content" id="filePreviewContent">
            <div class="file-preview-header" id="filePreviewHeader">
                <div class="file-preview-title" id="filePreviewTitle">文件预览</div>
                <div class="file-preview-header-actions">
                    <button class="file-preview-fit-btn" id="filePreviewFitBtn" title="切换显示模式" aria-label="切换显示模式">
                        <svg viewBox="0 0 24 24" width="18" height="18">
                            <path fill="currentColor" d="M3 5v14h18V5H3zm16 12H5V7h14v10z"/>
                        </svg>
                    </button>
                    <button class="file-preview-close" id="filePreviewClose" aria-label="关闭预览">
                        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                            <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="file-preview-body" id="filePreviewBody"></div>
            <div class="file-preview-resize-handle" id="filePreviewResizeHandle"></div>
        </div>
    </div>
    
    <div class="download-options-modal" id="downloadOptionsModal" role="dialog" aria-modal="true" aria-labelledby="downloadOptionsTitle">
        <div class="download-options-content">
            <div class="download-options-header">
                <h3 id="downloadOptionsTitle">选择下载格式</h3>
                <button class="download-options-close" id="downloadOptionsClose" aria-label="关闭">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <div class="download-options-body">
                <p class="download-options-desc">请选择文件夹的下载格式：</p>
                <div class="download-options-list">
                    <button class="download-option-btn" data-format="zip">
                        <span class="download-option-icon">📦</span>
                        <span class="download-option-info">
                            <strong>ZIP 压缩包</strong>
                            <span>通用格式，Windows/Mac/Linux 都支持</span>
                        </span>
                    </button>
                    <button class="download-option-btn" data-format="tar">
                        <span class="download-option-icon">📁</span>
                        <span class="download-option-info">
                            <strong>TAR 归档文件</strong>
                            <span>保留原始文件权限，适合 Linux/Mac</span>
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const originalFetch = window.fetch;
        window.fetch = async (...args) => {
            const response = await originalFetch(...args);
            if (response.status === 401) {
                window.location.href = '/login';
            }
            return response;
        };
        
        const chatContainer = document.getElementById('chatContainer');
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileInput = document.getElementById('fileInput');
        const folderInput = document.getElementById('folderInput');
        const notification = document.getElementById('notification');
        const contextMenu = document.getElementById('contextMenu');
        const searchPanel = document.getElementById('searchPanel');
        const searchBtn = document.getElementById('searchBtn');
        const searchKeyword = document.getElementById('searchKeyword');
        const searchCategoryName = document.getElementById('searchCategoryName');
        const searchFileType = document.getElementById('searchFileType');
        const searchStartDate = document.getElementById('searchStartDate');
        const searchEndDate = document.getElementById('searchEndDate');
        const searchSubmit = document.getElementById('searchSubmit');
        const searchClear = document.getElementById('searchClear');
        const categorySearchInput = document.getElementById('categorySearchInput');
        const searchCategoryDropdown = document.getElementById('searchCategoryDropdown');
        const searchCategoryDropdownList = document.getElementById('searchCategoryDropdownList');
        const searchCategorySelectAllBtn = document.getElementById('searchCategorySelectAllBtn');
        const searchCategoryDeselectAllBtn = document.getElementById('searchCategoryDeselectAllBtn');
        const searchCategoryConfirmBtn = document.getElementById('searchCategoryConfirmBtn');
        const searchResults = document.getElementById('searchResults');
        const searchBatchPanel = document.getElementById('searchBatchPanel');
        const searchSelectAll = document.getElementById('searchSelectAll');
        const searchSelectedCount = document.getElementById('searchSelectedCount');
        const searchBatchCopyBtn = document.getElementById('searchBatchCopyBtn');
        const searchBatchDownloadBtn = document.getElementById('searchBatchDownloadBtn');
        const searchBatchDeleteBtn = document.getElementById('searchBatchDeleteBtn');
        const batchBtn = document.getElementById('batchBtn');
        const batchPanel = document.getElementById('batchPanel');
        const selectAll = document.getElementById('selectAll');
        const selectedCount = document.getElementById('selectedCount');
        const batchCopyBtn = document.getElementById('batchCopyBtn');
        const batchDownloadBtn = document.getElementById('batchDownloadBtn');
        const batchDeleteBtn = document.getElementById('batchDeleteBtn');
        const cancelBatchBtn = document.getElementById('cancelBatchBtn');
        const progressModal = document.getElementById('progressModal');
        const progressBar = document.getElementById('progressBar');
        const progressTitle = document.getElementById('progressTitle');
        const progressText = document.getElementById('progressText');
        const progressDetail = document.getElementById('progressDetail');
        const confirmModal = document.getElementById('confirmModal');
        const confirmTitle = document.getElementById('confirmTitle');
        const confirmMessage = document.getElementById('confirmMessage');
        const confirmCancelBtn = document.getElementById('confirmCancelBtn');
        const confirmOkBtn = document.getElementById('confirmOkBtn');
        const filePreviewModal = document.getElementById('filePreviewModal');
        const filePreviewTitle = document.getElementById('filePreviewTitle');
        const filePreviewBody = document.getElementById('filePreviewBody');
        const filePreviewClose = document.getElementById('filePreviewClose');
        const filePreviewContent = document.getElementById('filePreviewContent');
        const filePreviewHeader = document.getElementById('filePreviewHeader');
        const filePreviewResizeHandle = document.getElementById('filePreviewResizeHandle');
        const filePreviewFitBtn = document.getElementById('filePreviewFitBtn');
        const downloadOptionsModal = document.getElementById('downloadOptionsModal');
        const downloadOptionsClose = document.getElementById('downloadOptionsClose');
        const downloadOptionBtns = document.querySelectorAll('.download-option-btn');
        
        let currentDownloadFolder = null;
        
        let lastMsgId = 0;
        let currentMsgId = null;
        let isSearchMode = false;
        let isBatchMode = false;
        let selectedMsgs = new Set();
        let selectedSearchMsgs = new Set();
        let searchResultMessages = [];
        let dragCounter = 0;
        let currentCategoryId = '';
        let selectedCategoryIds = new Set();
        let categories = [];
        let searchSelectedCategoryIds = new Set();
        let searchFilteredCategories = [];
        let isTrashMode = false;
        
        const sidebar = document.getElementById('sidebar');
        const categoryList = document.getElementById('categoryList');
        const addCategoryBtn = document.getElementById('addCategoryBtn');
        const toggleSidebarBtn = document.getElementById('toggleSidebarBtn');
        const categoryModal = document.getElementById('categoryModal');
        const categoryModalTitle = document.getElementById('categoryModalTitle');
        const categoryNameInput = document.getElementById('categoryNameInput');
        const categoryModalClose = document.getElementById('categoryModalClose');
        const categoryCancelBtn = document.getElementById('categoryCancelBtn');
        const categoryConfirmBtn = document.getElementById('categoryConfirmBtn');
        const trashBtn = document.getElementById('trashBtn');
        const trashCount = document.getElementById('trashCount');
        
        let editingCategoryId = null;
        
        function showNotification(message, type = 'info') {

        function showFilePreview(filename, fileUrl, fileType) {
            filePreviewTitle.textContent = filename;
            filePreviewBody.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-muted);">加载中...</div>';
            
            filePreviewContent.style.position = '';
            filePreviewContent.style.left = '';
            filePreviewContent.style.top = '';
            filePreviewContent.style.width = '';
            filePreviewContent.style.height = '';
            filePreviewModal.style.alignItems = '';
            filePreviewModal.style.justifyContent = '';
            
            if (fileType.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = fileUrl + '?preview=true';
                img.alt = filename;
                img.onerror = () => {
                    filePreviewBody.innerHTML = '<p style="color: var(--text-muted);">图片加载失败</p>';
                };
                filePreviewBody.innerHTML = '';
                filePreviewBody.appendChild(img);
            } else if (fileType === 'application/pdf') {
                fetch(fileUrl + '?preview=true', { credentials: 'same-origin' })
                    .then(response => {
                        if (response.status === 401) {
                            window.location.href = '/login';
                            return null;
                        }
                        if (!response.ok) throw new Error('加载失败');
                        return response.blob();
                    })
                    .then(blob => {
                        if (!blob) return;
                        const blobUrl = URL.createObjectURL(blob);
                        const iframe = document.createElement('iframe');
                        iframe.src = blobUrl + '#toolbar=1&navpanes=0&view=FitH';
                        iframe.onload = () => URL.revokeObjectURL(blobUrl);
                        filePreviewBody.innerHTML = '';
                        filePreviewBody.appendChild(iframe);
                    })
                    .catch(err => {
                        filePreviewBody.innerHTML = '<p style="color: var(--text-muted);">PDF加载失败</p>';
                    });
            } else {
                filePreviewBody.innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <div style="font-size: 64px; margin-bottom: 16px;">📄</div>
                        <p style="color: var(--text-secondary); margin-bottom: 16px;">此文件类型不支持预览</p>
                        <a href="${fileUrl}" download="${filename}" class="btn btn-primary" style="text-decoration: none;">下载文件</a>
                    </div>
                `;
            }
            
            filePreviewModal.style.display = 'flex';
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function formatTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const isToday = date.toDateString() === now.toDateString();
            
            if (isToday) {
                return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            } else {
                return date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' }) + ' ' + 
                       date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            }
        }
        
        function formatDateTime(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('zh-CN') + ' ' + 
                   date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                pdf: '📕', doc: '📘', docx: '📘',
                xls: '📗', xlsx: '📗',
                ppt: '📙', pptx: '📙',
                zip: '📦', rar: '📦', '7z': '📦', tar: '📦', gz: '📦',
                mp3: '🎵', wav: '🎵', flac: '🎵', m4a: '🎵',
                mp4: '🎬', avi: '🎬', mkv: '🎬', mov: '🎬',
                jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', bmp: '🖼️', webp: '🖼️',
                txt: '📄', md: '📄',
                py: '🐍', js: '📜', ts: '📜', html: '🌐', css: '🎨', json: '📋',
                exe: '⚙️', msi: '⚙️', apk: '📱', ipa: '📱'
            };
            return icons[ext] || '📎';
        }
        
        function isPreviewable(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const previewable = ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp', 'pdf'];
            return previewable.includes(ext);
        }
        
        function getFileType(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp'];
            if (imageExts.includes(ext)) return 'image/' + ext;
            if (ext === 'pdf') return 'application/pdf';
            return 'application/octet-stream';
        }
        
        function createMessageElement(msg) {
            const div = document.createElement('div');
            div.className = 'message';
            div.dataset.id = msg.id;
            div.dataset.type = msg.type;
            if (msg.type === 'file') div.dataset.fileId = msg.file_id;
            if (msg.type === 'folder') div.dataset.folderId = msg.folder_id;
            if (isBatchMode) div.classList.add('batch-mode');
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'msg-checkbox';
            checkbox.style.display = (isBatchMode || isSearchMode) ? 'inline-block' : 'none';
            checkbox.setAttribute('aria-label', '选择此消息');
            checkbox.addEventListener('change', (e) => {
                const msgId = String(msg.id);
                if (e.target.checked) {
                    selectedMsgs.add(msgId);
                    if (isSearchMode) selectedSearchMsgs.add(msgId);
                } else {
                    selectedMsgs.delete(msgId);
                    if (isSearchMode) selectedSearchMsgs.delete(msgId);
                }
                updateSelectedCount();
                if (isSearchMode) updateSearchSelectedCount();
            });
            
            const timeDiv = document.createElement('div');
            timeDiv.className = 'msg-time';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'msg-content';
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'msg-bubble';
            
            if (msg.type === 'text') {
                const textDiv = document.createElement('div');
                textDiv.className = 'msg-text';
                textDiv.textContent = msg.content;
                textDiv.dataset.fullContent = msg.content;
                
                if (msg.content && msg.content.length > 500) {
                    const previewText = msg.content.substring(0, 500) + '...';
                    textDiv.textContent = previewText;
                    textDiv.classList.add('msg-text-collapsed');
                    
                    const toggleBtn = document.createElement('button');
                    toggleBtn.className = 'msg-text-toggle';
                    toggleBtn.textContent = '展开';
                    toggleBtn.setAttribute('aria-label', '展开全文');
                    
                    toggleBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (textDiv.classList.contains('msg-text-collapsed')) {
                            textDiv.textContent = textDiv.dataset.fullContent;
                            textDiv.classList.remove('msg-text-collapsed');
                            textDiv.classList.add('msg-text-expanded');
                            toggleBtn.textContent = '收起';
                        } else {
                            textDiv.textContent = previewText;
                            textDiv.classList.remove('msg-text-expanded');
                            textDiv.classList.add('msg-text-collapsed');
                            toggleBtn.textContent = '展开';
                        }
                    });
                    
                    bubbleDiv.appendChild(textDiv);
                    bubbleDiv.appendChild(toggleBtn);
                } else {
                    bubbleDiv.appendChild(textDiv);
                }
            } else if (msg.type === 'folder') {
                bubbleDiv.classList.add('has-file');
                bubbleDiv.innerHTML = `
                    <div class="msg-file msg-folder" data-folder-id="${msg.folder_id}">
                        <span class="file-icon">📁</span>
                        <div class="file-info">
                            <span class="file-name" title="${escapeHtml(msg.filename)}">${escapeHtml(msg.filename)}</span>
                            <span class="file-size">${msg.file_count} 个文件 · ${formatFileSize(msg.file_size)}</span>
                        </div>
                        <a href="/api/messages/folder/${msg.folder_id}" class="file-download" download="${escapeHtml(msg.filename)}.zip" onclick="downloadWithProgress(event, '${msg.folder_id}', 'folder', '${escapeHtml(msg.filename)}')" aria-label="下载文件夹">
                            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                                <path fill="currentColor" d="M5 4h14v2H5V4zm7 18l6.67-7h-4.17V9h-5v6H5.33L12 22z"/>
                            </svg>
                        </a>
                    </div>
                `;
            } else {
                bubbleDiv.classList.add('has-file');
                var displayName = msg.relative_path ? msg.relative_path : msg.filename;
                const canPreview = isPreviewable(msg.filename);
                bubbleDiv.innerHTML = `
                    <div class="msg-file" data-id="${msg.file_id}" data-filename="${escapeHtml(msg.filename)}">
                        <span class="file-icon">${getFileIcon(msg.filename)}</span>
                        <div class="file-info">
                            <span class="file-name" title="${escapeHtml(displayName)}">${escapeHtml(displayName)}</span>
                            <span class="file-size">${formatFileSize(msg.file_size)}</span>
                        </div>
                        ${canPreview ? `<button class="file-download file-preview-btn" data-file-id="${msg.file_id}" data-filename="${escapeHtml(msg.filename)}" aria-label="预览文件">
                            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                                <path fill="currentColor" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                            </svg>
                        </button>` : ''}
                        <a href="/api/messages/file/${msg.file_id}" class="file-download" download="${escapeHtml(msg.filename)}" onclick="downloadWithProgress(event, '${msg.file_id}', 'file', '${escapeHtml(msg.filename)}')" aria-label="下载文件">
                            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                                <path fill="currentColor" d="M5 4h14v2H5V4zm7 18l6.67-7h-4.17V9h-5v6H5.33L12 22z"/>
                            </svg>
                        </a>
                    </div>
                `;
            }
            
            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'msg-avatar';
            avatarDiv.innerHTML = `
                <svg viewBox="0 0 24 24" width="36" height="36" aria-hidden="true">
                    <circle cx="12" cy="12" r="12" fill="#07C160"/>
                    <circle cx="12" cy="10" r="4" fill="white"/>
                    <path d="M12 14c-4 0-7 2-7 4v2h14v-2c0-2-3-4-7-4z" fill="white"/>
                </svg>
            `;
            
            div.appendChild(checkbox);
            contentDiv.appendChild(bubbleDiv);
            contentDiv.appendChild(avatarDiv);
            
            div.appendChild(timeDiv);
            div.appendChild(contentDiv);
            
            return div;
        }
        
        function addMessage(msg, prepend = false) {
            const existingMsg = chatMessages.querySelector(`[data-id="${msg.id}"]`);
            if (existingMsg) return;
            
            const msgEl = createMessageElement(msg);
            
            if (prepend) {
                const welcomeMsg = chatMessages.querySelector('.welcome-message');
                if (welcomeMsg) {
                    chatMessages.insertBefore(msgEl, welcomeMsg.nextSibling);
                } else {
                    chatMessages.insertBefore(msgEl, chatMessages.firstChild.nextSibling);
                }
            } else {
                chatMessages.appendChild(msgEl);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            
            lastMsgId = Math.max(lastMsgId, msg.id);
        }

        async function loadTrashCount() {
            try {
                const [msgRes, catRes] = await Promise.all([
                    fetch('/api/trash'),
                    fetch('/api/categories/trash')
                ]);
                const msgData = await msgRes.json();
                const catData = await catRes.json();
                if (msgRes.ok && catRes.ok) {
                    trashCount.textContent = msgData.messages.length + catData.categories.length;
                }
            } catch (error) {
                console.error('Failed to load trash count:', error);
            }

        async function loadTrash() {
            isTrashMode = true;
            isSearchMode = false;
            searchPanel.classList.remove('active');
            batchPanel.classList.remove('active');
            
            document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
            trashBtn.classList.add('active');
            
            try {
                const [msgRes, catRes] = await Promise.all([
                    fetch('/api/trash'),
                    fetch('/api/categories/trash')
                ]);
                const msgData = await msgRes.json();
                const catData = await catRes.json();
                
                if (msgRes.ok && catRes.ok) {
                    const categories = catData.categories || [];
                    const messages = msgData.messages || [];
                    
                    chatMessages.innerHTML = `
                        <div class="trash-header">
                            <h3>🗑️ 回收站</h3>
                            <button class="btn-empty-trash" id="emptyTrashBtn">清空回收站</button>
                        </div>
                        <div class="trash-list" id="trashList"></div>
                    `;
                    
                    const trashList = document.getElementById('trashList');
                    
                    if (categories.length === 0 && messages.length === 0) {
                        trashList.innerHTML = `
                            <div class="trash-empty">
                                <p>回收站是空的</p>
                            </div>
                        `;
                    } else {
                        categories.forEach(cat => {
                            const item = createTrashCategoryItem(cat);
                            trashList.appendChild(item);
                        });
                        
                        messages.forEach(msg => {
                            const item = createTrashItem(msg);
                            trashList.appendChild(item);
                        });
                    }
                    
                    document.getElementById('emptyTrashBtn').addEventListener('click', emptyTrash);
                }
            } catch (error) {
                console.error('Failed to load trash:', error);
            }
        }

        async function toggleCategoryFiles(categoryId) {
            const filesContainer = document.getElementById(`cat-files-${categoryId}`);
            const toggle = document.querySelector(`.trash-category-header[data-id="${categoryId}"] .trash-category-toggle`);
            
            if (filesContainer.style.display === 'none') {
                filesContainer.style.display = 'block';
                toggle.textContent = '▼';
                
                try {
                    const response = await fetch(`/api/trash`);
                    const data = await response.json();
                    if (response.ok) {
                        const catMessages = data.messages.filter(m => m.category_id == categoryId);
                        filesContainer.innerHTML = '';
                        if (catMessages.length === 0) {
                            filesContainer.innerHTML = '<div class="trash-category-empty">暂无文件</div>';
                        } else {
                            catMessages.forEach(msg => {
                                const fileItem = createTrashFileItem(msg, true);
                                filesContainer.appendChild(fileItem);
                            });
                        }
                    }
                } catch (error) {
                    filesContainer.innerHTML = '<div class="trash-category-error">加载失败</div>';
                }
            } else {
                filesContainer.style.display = 'none';
                toggle.textContent = '▶';

        function createTrashFileItem(msg, isNested = false) {
            const item = document.createElement('div');
            item.className = isNested ? 'trash-file-item-nested' : 'trash-item-msg';
            item.dataset.id = msg.id;
            
            let content = '';
            let size = '';
            
            if (msg.type === 'text') {
                content = msg.content.length > 100 ? msg.content.substring(0, 100) + '...' : msg.content;
            } else if (msg.type === 'folder') {
                content = `📁 ${msg.filename}`;
                size = formatFileSize(msg.file_size);
            } else {
                content = `📎 ${msg.filename}`;
                size = formatFileSize(msg.file_size);
            }
            
            item.innerHTML = `
                <div class="trash-msg-content">
                    <span class="trash-msg-type">${msg.type === 'text' ? '📝' : msg.type === 'folder' ? '📁' : '📎'}</span>
                    <span class="trash-msg-text">${escapeHtml(content)}</span>
                    ${size ? `<span class="trash-msg-size">${size}</span>` : ''}

                <div class="trash-msg-info">
                    <span class="trash-msg-time">删除于 ${msg.deleted_at || msg.time}</span>

                    <button class="btn-delete-permanent" data-id="${msg.id}">彻底删除</button>
                </div>
            `;
            
            return item;
        }
        
        function createTrashItem(msg) {

        function formatFileSize(bytes) {
            if (!bytes) return '';
            const units = ['B', 'KB', 'MB', 'GB'];
            let i = 0;
            while (bytes >= 1024 && i < units.length - 1) {
                bytes /= 1024;
                i++;
            }
            return bytes.toFixed(i > 0 ? 1 : 0) + units[i];
        }

                : [];

                searchCategoryDropdownList.innerHTML = '<div class="search-category-dropdown-empty">未找到匹配的目录</div>';

                const currentIds = new Set(searchFilteredCategories.map(cat => String(cat.id)));
                const existingIds = new Set(searchSelectedCategoryIds);
                
                searchSelectedCategoryIds.clear();
                searchFilteredCategories.forEach(cat => {
                    const catId = String(cat.id);
                    if (existingIds.has(catId)) {
                        searchSelectedCategoryIds.add(catId);
                    }

                if (searchSelectedCategoryIds.size === 0) {
                    searchFilteredCategories.forEach(cat => {

                renderSearchCategoryDropdown();

        async function saveCategory() {
            const name = categoryNameInput.value.trim();
            if (!name) {
                showNotification('请输入目录名称', 'error');
                return;
            }
            
            try {
                if (editingCategoryId) {
                    const response = await fetch(`/api/categories/${editingCategoryId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name })
                    });
                    if (response.ok) {
                        const cat = categories.find(c => c.id == editingCategoryId);
                        if (cat) cat.name = name;
                        renderCategories();
                        showNotification('目录已更新', 'success');
                    }
                } else {
                    const response = await fetch('/api/categories', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name })
                    });
                    if (response.ok) {
                        const data = await response.json();
                        categories.push(data.category);
                        renderCategories();
                        showNotification('目录已创建', 'success');
                    }
                }
                closeCategoryModal();
            } catch (error) {
                showNotification('操作失败', 'error');
            }
        }

            const confirmed = await showConfirm('删除目录', '确定删除该目录吗？目录及其中的文件将移至回收站。');
            if (!confirmed) return;
            
            try {
                const response = await fetch(`/api/categories/${categoryId}`, { method: 'DELETE' });
                const data = await response.json();
                if (response.ok) {
                    categories = categories.filter(c => c.id != categoryId);
                    renderCategories();
                    if (currentCategoryId == categoryId) {
                        selectCategory('', '全部');
                    }
                    showNotification(data.message || '目录已移至回收站', 'success');
                    loadTrashCount();
                }
            } catch (error) {
                showNotification('删除失败', 'error');
            }
        }

        async function sendFile(file, relativePath = null) {
            const tempId = 'temp-' + Date.now();
            const tempMsg = {
                id: tempId,
                type: 'file',
                filename: relativePath || file.name,
                file_size: file.size,
                file_id: null,
                relative_path: relativePath,
                time: new Date().toISOString()
            };
            
            const msgEl = createUploadingMessage(tempMsg, file.name);
            chatMessages.appendChild(msgEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            const formData = new FormData();
            formData.append('file', file);
            if (relativePath) {
                formData.append('relative_path', relativePath);
            }
            if (currentCategoryId) {
                formData.append('category_id', currentCategoryId);
            }
            
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 100);
                        updateMessageProgress(msgEl, percent, percent >= 100 ? 'processing' : 'uploading');
                    }
                };
                xhr.onload = () => {
                    if (xhr.status === 201) {
                        const data = JSON.parse(xhr.responseText);
                        if (!currentCategoryId || data.msg.category_id == currentCategoryId) {
                            replaceWithRealMessage(msgEl, data.msg);
                        } else {
                            msgEl.remove();
                        }
                        showNotification('发送成功', 'success');
                        resolve(data);
                    } else {
                        msgEl.remove();
                        const data = JSON.parse(xhr.responseText);
                        showNotification(data.error || '发送失败', 'error');
                        reject(data);
                    }
                };
                xhr.onerror = () => {
                    msgEl.remove();
                    showNotification('网络错误', 'error');
                    reject(new Error('网络错误'));
                };
                xhr.open('POST', '/api/messages/file');
                xhr.send(formData);
            });
        }

        function updateMessageProgress(msgEl, percent, status = 'uploading') {
            const progressBar = msgEl.querySelector('.progress-bar');
            const percentText = msgEl.querySelector('.msg-upload-percent');
            
            if (progressBar) {
                const circumference = 2 * Math.PI * 22;
                const offset = circumference - (Math.min(percent, 100) / 100) * circumference;
                progressBar.style.strokeDashoffset = offset;
                
                if (status === 'processing') {
                    progressBar.style.stroke = 'var(--secondary-color)';
                    progressBar.style.animation = 'pulse 1s ease-in-out infinite';
                }
            }
            
            if (percentText) {
                if (status === 'processing') {
                    percentText.textContent = '处理中';
                    percentText.style.color = 'var(--secondary-color)';
                } else {
                    percentText.textContent = percent + '%';
                }
            }
        }

        async function handleDrop(e) {
            e.preventDefault();
            dragCounter = 0;
            chatContainer.classList.remove('drag-over');
            
            const items = e.dataTransfer.items;
            
            if (items) {
                const entries = [];
                for (let i = 0; i < items.length; i++) {
                    const item = items[i];
                    if (item.kind === 'file') {
                        const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
                        if (entry) {
                            entries.push(entry);
                        } else {
                            const file = item.getAsFile();
                            if (file) {
                                sendFile(file);
                            }
                        }
                    }
                }
                
                if (entries.length > 0) {
                    for (const entry of entries) {
                        if (entry.isDirectory) {
                            const files = await readDirectoryRecursively(entry, entry.name);
                            if (files.length > 0) {
                                sendFolder(files);
                            }
                        } else {
                            entry.file(file => {
                                sendFile(file, entry.fullPath.startsWith('/') ? entry.fullPath.slice(1) : entry.fullPath);
                            });
                        }
                    }
                }
            } else {
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    for (let i = 0; i < files.length; i++) {
                        sendFile(files[i]);
                    }
                }
            }
        }
        
        function readDirectoryRecursively(dirEntry, path = '') {
            return new Promise((resolve) => {
                const files = [];
                const dirReader = dirEntry.createReader();
                
                function readEntries() {
                    dirReader.readEntries(async (entries) => {
                        if (entries.length === 0) {
                            resolve(files);
                            return;
                        }
                        
                        for (const entry of entries) {
                            const entryPath = path ? `${path}/${entry.name}` : entry.name;
                            
                            if (entry.isDirectory) {
                                const subFiles = await readDirectoryRecursively(entry, entryPath);
                                files.push(...subFiles);
                            } else {
                                const file = await new Promise((res) => {
                                    entry.file(f => {
                                        Object.defineProperty(f, 'webkitRelativePath', {
                                            value: entryPath,
                                            writable: false
                                        });
                                        res(f);
                                    });
                                });
                                files.push(file);
                            }
                        }
                        
                        readEntries();
                    });
                }
                
                readEntries();
            });
        }

            e.preventDefault();
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            const rect = filePreviewContent.getBoundingClientRect();
            dragStartLeft = rect.left;
            dragStartTop = rect.top;
            filePreviewContent.style.position = 'fixed';
            filePreviewContent.style.left = dragStartLeft + 'px';
            filePreviewContent.style.top = dragStartTop + 'px';
            filePreviewContent.style.margin = '0';
            filePreviewModal.style.alignItems = 'flex-start';
            filePreviewModal.style.justifyContent = 'flex-start';
            filePreviewContent.classList.add('resizing');
        });
        
        document.addEventListener('mousemove', (e) => {
            if (isResizing) {
                const deltaX = e.clientX - resizeStartX;
                const deltaY = e.clientY - resizeStartY;
                const newWidth = Math.max(600, Math.min(window.innerWidth - 20, resizeStartWidth + deltaX));
                const newHeight = Math.max(400, Math.min(window.innerHeight - 20, resizeStartHeight + deltaY));
                filePreviewContent.style.width = newWidth + 'px';
                filePreviewContent.style.height = newHeight + 'px';
            }
            if (isDragging) {
                const deltaX = e.clientX - dragStartX;
                const deltaY = e.clientY - dragStartY;
                const newLeft = Math.max(0, Math.min(window.innerWidth - filePreviewContent.offsetWidth, dragStartLeft + deltaX));
                const newTop = Math.max(0, Math.min(window.innerHeight - filePreviewContent.offsetHeight, dragStartTop + deltaY));
                filePreviewContent.style.left = newLeft + 'px';
                filePreviewContent.style.top = newTop + 'px';
            }
        });
        
        document.addEventListener('mouseup', () => {
            if (isResizing || isDragging) {
                isResizing = false;
                isDragging = false;
                filePreviewContent.classList.remove('resizing');
            }
        });
        
        chatMessages.addEventListener('click', (e) => {
            const previewBtn = e.target.closest('.file-preview-btn');
            if (previewBtn) {
                const fileId = previewBtn.dataset.fileId;
                const filename = previewBtn.dataset.filename;
                const fileUrl = `/api/messages/file/${fileId}`;
                const fileType = getFileType(filename);
                showFilePreview(filename, fileUrl, fileType);
            }
        });
        
        chatMessages.addEventListener('contextmenu', (e) => {
            const bubble = e.target.closest('.msg-bubble');
            if (bubble) {
                e.preventDefault();
                const message = bubble.closest('.message');
                currentMsgId = message.dataset.id;
                
                contextMenu.style.left = e.pageX + 'px';
                contextMenu.style.top = e.pageY + 'px';
                contextMenu.style.display = 'block';
            }
        });
        
        document.addEventListener('click', () => {
            contextMenu.style.display = 'none';
        });
        
        contextMenu.addEventListener('click', (e) => {
            const action = e.target.closest('.menu-item')?.dataset.action;
            if (currentMsgId && action) {
                if (action === 'copy') {
                    const msgEl = chatMessages.querySelector(`[data-id="${currentMsgId}"]`);
                    const textEl = msgEl.querySelector('.msg-text');
                    if (textEl) {
                        const fullContent = textEl.dataset.fullContent || textEl.textContent;
                        navigator.clipboard.writeText(fullContent).then(() => {
                            showNotification('已复制', 'success');
                        }).catch(() => {
                            showNotification('复制失败', 'error');
                        });
                    }
                } else if (action === 'delete') {
                    showConfirm('确认删除', '确定删除这条消息吗？', true).then(confirmed => {
                        if (confirmed) {
                            deleteMessage(currentMsgId);
                        }
                    });
                }
            }
        });
        
        chatContainer.addEventListener('dragenter', handleDragEnter);
        chatContainer.addEventListener('dragleave', handleDragLeave);
        chatContainer.addEventListener('dragover', handleDragOver);
        chatContainer.addEventListener('drop', handleDrop);
        
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            const confirmed = await showConfirm('退出登录', '确定要退出登录吗？');
            if (confirmed) {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/login';
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (filePreviewModal.style.display === 'flex') {
                    hideFilePreview();
                }
                if (confirmModal.style.display === 'flex') {
                    hideConfirm(false);
                }
                if (progressModal.style.display === 'flex') {
                    return;
                }
            }
        });
        
        trashBtn.addEventListener('click', loadTrash);
        
        chatMessages.addEventListener('click', (e) => {
            const restoreBtn = e.target.closest('.btn-restore');
            const deleteBtn = e.target.closest('.btn-delete-permanent');
            const restoreCategoryBtn = e.target.closest('.btn-restore-category');
            const deleteCategoryBtn = e.target.closest('.btn-delete-category-permanent');
            const categoryHeader = e.target.closest('.trash-category-header');
            
            if (restoreBtn) {
                restoreMessage(parseInt(restoreBtn.dataset.id));
            }
            if (deleteBtn) {
                permanentDelete(parseInt(deleteBtn.dataset.id));
            }
            if (restoreCategoryBtn) {
                e.stopPropagation();
                restoreCategory(parseInt(restoreCategoryBtn.dataset.id));
            }
            if (deleteCategoryBtn) {
                e.stopPropagation();
                permanentDeleteCategory(parseInt(deleteCategoryBtn.dataset.id));
            }
            if (categoryHeader && !e.target.closest('button')) {
                toggleCategoryFiles(categoryHeader.dataset.id);
            }
        });
        
        loadCategories();
        loadMessages();
        loadTrashCount();
        
        setInterval(pollNewMessages, 2000);
    </script>
</body>
</html>
